name: 'Setup and install'
description: 'Common setup steps for CI jobs'

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v5

    - uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'pnpm'

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
