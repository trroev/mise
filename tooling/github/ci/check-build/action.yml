name: 'Build'
description: 'Build'

runs:
  using: composite
  steps:
    - name: Setup
      uses: ./tooling/github/setup

    - name: Configure Turborepo Caching
      uses: rharkor/caching-for-turbo@v2.3.11
      with:
        cache-prefix: build_

    - name: Build
      shell: bash
      # Invoke next directly (no dotenvx) — CI has no private key.
      run: pnpm --filter web exec next build
      env:
        SKIP_ENV_VALIDATION: 'true'
