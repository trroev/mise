name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  SKIP_ENV_VALIDATION: "true"

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Invoke payload directly (no dotenvx) so CI can run without the private key.
      - name: Generate Payload types
        run: pnpm --filter web exec payload generate:types

      - name: Check for stale Payload types
        run: git diff --exit-code packages/payload/src/types/payload-types.ts

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Invoke next directly (no dotenvx) so CI can run without the private key.
      - name: Build
        run: pnpm --filter web exec next build
